apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuelspy-frontend
  namespace: fuelspy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fuelspy-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fuelspy-frontend
    spec:
      containers:
        - name: frontend
          image: arshdang/fuelspy-frontend:v2
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: fuelspy-frontend
  namespace: fuelspy
spec:
  selector:
    app: fuelspy-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
